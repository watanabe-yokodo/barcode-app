<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>バーコード検証</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f2f2f7;
}

.header {
  background: #007aff;
  color: white;
  text-align: center;
  padding: 14px;
  font-weight: bold;
  font-size: 18px;
}

.container { padding: 10px; }

.card {
  background: white;
  border-radius: 16px;
  padding: 14px;
  margin-bottom: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

.title {
  font-size: 14px;
  color: #666;
  margin-bottom: 6px;
}

input {
  width: 100%;
  padding: 12px;
  font-size: 18px;
  border-radius: 10px;
  border: 1px solid #ddd;
  margin-bottom: 8px;
}

button.action {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  font-weight: bold;
  margin-top: 6px;
}

.primary { background: #007aff; color: white; }
.secondary { background: #34c759; color: white; }
.danger { background: #ff3b30; color: white; }

.camera-wrap {
  position: relative;
  width: 100%;
  height: 25vh;   /* ← ここで高さ固定 */
  overflow: hidden;
  border-radius: 12px;
  background: black;
}

/* 🔥 カメラ高さ制御 */
video {
  width: 100%;
  height: 100%;
  object-fit: cover;  /* ← 枠内に収める */
}

/* 🔥 OCRガイド（表示と処理が完全一致） */
#guide {
  position: absolute;
  left: 5%;
  width: 90%;

  top: 65%;
  height: 80px;   /* ← 固定サイズ（ここ重要） */

  border: 3px solid #00ff88;
  border-radius: 10px;
  box-shadow: 0 0 0 9999px rgba(0,0,0,0.2);
}

.result-box {
  margin-top: 10px;
  padding: 10px;
  border-radius: 10px;
  background: #f9f9f9;
}

.label {
  font-size: 12px;
  color: #888;
}

.value {
  font-size: 22px;
  font-weight: bold;
  word-break: break-all;
}

.green { color: #28a745; }
.red { color: #ff3b30; }
</style>
</head>

<body>

<div class="header">バーコード検証</div>

<div class="container">

  <!-- 原稿 -->
  <div class="card">
    <div class="title">原稿（基準）</div>
    <input id="manualInput" placeholder="手入力 or OCR">
    <button class="action primary" onclick="saveManual()">入力を保存</button>
    <button class="action secondary" onclick="startMasterOCR()">📷 OCR読み取り</button>
    <button class="action danger" onclick="clearMaster()">クリア</button>

    <div class="result-box">
      <div class="label">原稿結果</div>
      <div id="masterResult" class="value"></div>
    </div>
  </div>

  <!-- スキャン -->
  <div class="card">
    <div class="title">バーコード検証</div>

    <div style="display:flex; gap:8px;">
      <button class="action primary" style="flex:1;" onclick="startBarcodeScan()">📷 コードスキャン</button>
      <button class="action secondary" style="flex:1;" onclick="startOCRScan()">🔢 OCR数字</button>
    </div>

    <button class="action danger" onclick="clearResults()">結果クリア</button>

    <div class="camera-wrap">
      <video id="video" autoplay playsinline></video>
      <div id="guide"></div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <div class="result-box">
      <div class="label">バーコード</div>
      <div id="barResult" class="value"></div>
    </div>

    <div class="result-box">
      <div class="label">OCR（数字）</div>
      <div id="ocrResult" class="value"></div>
    </div>
  </div>

</div>

<script>
let masterCode = "";
const video = document.getElementById("video");

/* ================= 共通 ================= */

async function startCameraStream() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });
  video.srcObject = stream;
}

function displayResult(id, value) {
  const el = document.getElementById(id);
  el.innerText = value;

  if (!masterCode) return;

  if (value === masterCode) {
    el.className = "value green";
  } else {
    el.className = "value red";
  }
}

/* ================= 原稿 ================= */

function saveManual() {
  masterCode = manualInput.value;
  masterResult.innerText = masterCode;
}

function clearMaster() {
  masterCode = "";
  masterResult.innerText = "";
  manualInput.value = "";
}

async function startMasterOCR() {
  await startCameraStream();
  setTimeout(() => captureImage("master"), 1500);
}

/* ================= バーコード ================= */

async function startBarcodeScan() {
  try {
    await startCameraStream();

    const reader = new ZXing.BrowserBarcodeReader();
    const result = await reader.decodeOnceFromVideoDevice(undefined, video);

    displayResult("barResult", result.text);

  } catch {
    alert("バーコード読み取り失敗");
  }
}

/* ================= OCR（最強版） ================= */

async function startOCRScan() {
  await startCameraStream();
  setTimeout(() => captureImage("ocr"), 1500);
}

function captureImage(type) {
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  const guide = document.getElementById("guide");

  const vw = video.videoWidth;
  const vh = video.videoHeight;

  const rectVideo = video.getBoundingClientRect();
  const rectGuide = guide.getBoundingClientRect();

  const scaleX = vw / rectVideo.width;
  const scaleY = vh / rectVideo.height;

  const cropX = (rectGuide.left - rectVideo.left) * scaleX;
  const cropY = (rectGuide.top - rectVideo.top) * scaleY;
  const cropW = rectGuide.width * scaleX;
  const cropH = rectGuide.height * scaleY;

  canvas.width = cropW * 3;
  canvas.height = cropH * 3;

  ctx.drawImage(
    video,
    cropX, cropY, cropW, cropH,
    0, 0, canvas.width, canvas.height
  );

  let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  let data = imageData.data;

  for (let i = 0; i < data.length; i += 4) {
    let gray = (data[i] + data[i+1] + data[i+2]) / 3;
    gray = gray > 140 ? 255 : 0;
    data[i] = data[i+1] = data[i+2] = gray;
  }

  ctx.putImageData(imageData, 0, 0);

  const image = canvas.toDataURL("image/png");
  runOCRMulti(image, type);
}

async function runOCRMulti(image, type) {
  let results = [];

  for (let i = 0; i < 3; i++) {
    const result = await Tesseract.recognize(image, 'eng', {
      tessedit_char_whitelist: '0123456789',
      tessedit_pageseg_mode: 7
    });

    const text = result.data.text.replace(/[^0-9]/g, "");
    if (text) results.push(text);
  }

  let best = results.sort((a,b) => b.length - a.length)[0] || "";

  if (type === "master") {
    masterCode = best;
    masterResult.innerText = best;
  } else {
    displayResult("ocrResult", best);
  }
}

/* ================= クリア ================= */

function clearResults() {
  barResult.innerText = "";
  ocrResult.innerText = "";
  barResult.className = "value";
  ocrResult.className = "value";
}
</script>

</body>
</html>
