<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>バーコード検証</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: sans-serif;
  background: #f2f2f7;
}

.container {
  padding: 10px;
}

.card {
  background: #fff;
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  margin-top: 6px;
  font-size: 16px;
}

.blue { background: #007aff; color: #fff; }
.green { background: #34c759; color: #fff; }
.red { background: #ff3b30; color: #fff; }

/* 🔥 カメラ枠固定（ここが今回の本体） */
.camera-wrap {
  position: relative;
  width: 100%;
  height: 250px;  /* ← 固定 */
  overflow: hidden;
  border-radius: 12px;
  background: black;
}

/* 🔥 videoは中にフィット */
video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* OCRガイド */
#guide {
  position: absolute;
  left: 5%;
  width: 90%;
  top: 70%;
  height: 80px;
  border: 3px solid #00ff88;
  border-radius: 10px;
  box-shadow: 0 0 0 9999px rgba(0,0,0,0.2);
}

.result {
  margin-top: 10px;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <button class="blue" onclick="startBarcode()">📷 コードスキャン</button>
    <button class="green" onclick="startOCR()">🔢 OCR数字</button>
    <button class="red" onclick="clearResult()">クリア</button>

    <div class="camera-wrap">
      <video id="video" autoplay playsinline></video>
      <div id="guide"></div>
    </div>

    <div class="result">バーコード: <span id="bar"></span></div>
    <div class="result">OCR: <span id="ocr"></span></div>
  </div>

</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
const video = document.getElementById("video");

/* カメラ起動 */
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });
  video.srcObject = stream;
}

/* バーコード */
async function startBarcode() {
  await startCamera();

  const reader = new ZXing.BrowserBarcodeReader();
  const result = await reader.decodeOnceFromVideoDevice(undefined, video);

  document.getElementById("bar").innerText = result.text;
}

/* OCR */
async function startOCR() {
  await startCamera();
  setTimeout(capture, 1500);
}

/* OCRキャプチャ（ガイド一致版） */
function capture() {
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  const guide = document.getElementById("guide");

  const vw = video.videoWidth;
  const vh = video.videoHeight;

  const rectVideo = video.getBoundingClientRect();
  const rectGuide = guide.getBoundingClientRect();

  const scaleX = vw / rectVideo.width;
  const scaleY = vh / rectVideo.height;

  const cropX = (rectGuide.left - rectVideo.left) * scaleX;
  const cropY = (rectGuide.top - rectVideo.top) * scaleY;
  const cropW = rectGuide.width * scaleX;
  const cropH = rectGuide.height * scaleY;

  canvas.width = cropW * 2;
  canvas.height = cropH * 2;

  ctx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, canvas.width, canvas.height);

  let img = ctx.getImageData(0, 0, canvas.width, canvas.height);
  let d = img.data;

  for (let i = 0; i < d.length; i += 4) {
    let g = (d[i] + d[i+1] + d[i+2]) / 3;
    g = g > 140 ? 255 : 0;
    d[i] = d[i+1] = d[i+2] = g;
  }

  ctx.putImageData(img, 0, 0);

  Tesseract.recognize(canvas.toDataURL(), 'eng', {
    tessedit_char_whitelist: '0123456789',
    tessedit_pageseg_mode: 7
  }).then(res => {
    document.getElementById("ocr").innerText =
      res.data.text.replace(/[^0-9]/g, "");
  });
}

/* クリア */
function clearResult() {
  document.getElementById("bar").innerText = "";
  document.getElementById("ocr").innerText = "";
}
</script>

</body>
</html>
