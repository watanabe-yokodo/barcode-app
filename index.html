<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>バーコード検証（iPhone対応版）</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f2f2f7;
}
.header {
  background: #007aff;
  color: white;
  text-align: center;
  padding: 14px;
  font-weight: bold;
}
.container { padding: 10px; }
.card {
  background: white;
  border-radius: 16px;
  padding: 14px;
  margin-bottom: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

.title {
  font-size: 14px;
  color: #666;
  margin-bottom: 6px;
}

input {
  width: 100%;
  padding: 12px;
  font-size: 18px;
  border-radius: 10px;
  border: 1px solid #ddd;
  margin-bottom: 8px;
}

button.action {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  font-weight: bold;
  margin-top: 6px;
}

.primary { background: #007aff; color: white; }
.secondary { background: #34c759; color: white; }
.danger { background: #ff3b30; color: white; }

.camera-wrap {
  position: relative;
  width: 100%;
  height: 250px;   /* ← 好きな高さ（固定） */
  overflow: hidden;
  border-radius: 12px;
  background: black;
}

video {
  width: 100%;
  height: 100%;       /* ← 追加 */
  object-fit: cover;  /* ← 追加（重要） */
}

#guide {
  position: absolute;
  top: 40%;
  left: 10%;
  width: 80%;
  height: 20%;
  border: 3px solid #00ff88;
  border-radius: 10px;
  box-shadow: 0 0 0 9999px rgba(0,0,0,0.2);
}

.result-box {
  margin-top: 10px;
  padding: 10px;
  border-radius: 10px;
  background: #f9f9f9;
}

.label {
  font-size: 12px;
  color: #888;
}

.value {
  font-size: 22px;
  font-weight: bold;
  word-break: break-all;
}

.green { color: #28a745; }
.red { color: #ff3b30; }
</style>
</head>

<body>

<div class="header">バーコード検証</div>

<div class="container">

  <!-- 原稿 -->
  <div class="card">
    <div class="title">原稿（基準）</div>
    <input id="manualInput" placeholder="手入力 or OCR">
    <button class="action primary" onclick="saveManual()">入力を保存</button>
    <button class="action secondary" onclick="startCamera('master')">📷 OCR読み取り</button>
    <button class="action danger" onclick="clearMaster()">クリア</button>

    <div class="result-box">
      <div class="label">原稿結果</div>
      <div id="masterResult" class="value"></div>
    </div>
  </div>

  <!-- スキャン -->
<div class="card">
    <div class="title">バーコード検証</div>
<button class="primary" onclick="startScan()">スキャン開始</button>
<button class="danger" onclick="stopCamera()">停止</button>

<div class="camera-wrap">
<video id="video" autoplay playsinline muted></video>
<div id="guide"></div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

    <div class="result-box">
      <div class="label">バーコード</div>
      <div id="barResult" class="value"></div>
    </div>

    <div class="result-box">
      <div class="label">OCR（数字）</div>
      <div id="ocrResult" class="value"></div>
    </div>
  </div>

</div>

<script>
let masterCode = "";
let video = document.getElementById("video");
let stream = null;
let reader = null;
let scanning = false;

function saveManual() {
  masterCode = manualInput.value;
  masterResult.innerText = masterCode;
}

// iPhone安定版カメラ起動
async function startCamera() {
  stopCamera();

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { exact: "environment" }
      },
      audio: false
    });
  } catch {
    // fallback
    stream = await navigator.mediaDevices.getUserMedia({
      video: true
    });
  }

  video.srcObject = stream;

  await video.play();
}

// カメラ停止（重要）
function stopCamera() {
  scanning = false;

  if (reader) {
    reader.reset();
  }

  if (stream) {
    stream.getTracks().forEach(track => track.stop());
  }
}

// スキャン（連続方式に変更）
async function startScan() {
  await startCamera();

  reader = new ZXing.BrowserBarcodeReader();
  scanning = true;

  reader.decodeFromVideoDevice(null, video, async (result, err) => {
    if (!scanning) return;

    if (result) {
      scanning = false;

      displayResult("barResult", result.text);

      // OCRは少し遅らせる（安定化）
      setTimeout(() => captureOCR(), 500);
    }
  });
}

// OCR（軽量化）
function captureOCR() {
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  const vw = video.videoWidth;
  const vh = video.videoHeight;

  const cropX = vw * 0.1;
  const cropY = vh * 0.4;
  const cropW = vw * 0.8;
  const cropH = vh * 0.2;

  canvas.width = cropW;
  canvas.height = cropH;

  ctx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);

  const image = canvas.toDataURL("image/png");

  Tesseract.recognize(image, 'eng', {
    tessedit_char_whitelist: '0123456789'
  }).then(res => {
    let text = res.data.text.replace(/[^0-9]/g, "");
    displayResult("ocrResult", text);
  });
}

function displayResult(id, value) {
  const el = document.getElementById(id);
  el.innerText = value;

  if (!masterCode) return;

  if (value === masterCode) {
    el.className = "value green";
  } else {
    el.className = "value red";
  }
}
</script>

</body>
</html>
